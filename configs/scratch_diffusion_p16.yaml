# Baseline: Diffusion from scratch, patch_size=16 (same arch as initdec for fair comparison)

# Data
data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

# Model
model:
  encoder_patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  pretrain_decoder_dim: 512
  pretrain_decoder_depth: 4
  pretrain_decoder_num_heads: 8

  decoder_patch_size: 16
  decoder_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8

# Diffusion
diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear

# Training
training:
  epochs: 200
  batch_size: 128
  lr: 1.0e-4
  min_lr: 1.0e-6
  weight_decay: 0.01
  warmup_epochs: 10
  clip_grad: 1.0
  freeze_encoder: false

# Logging
logging:
  log_dir: ./logs/scratch_diffusion_p16
  save_every: 20
  print_every: 100
