# Diffusion finetuning with decoder initialized from pretrained weights
# Uses decoder_patch_size=16 (same as pretrained) so weights are directly compatible

# Data
data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

# Model
model:
  # Encoder (must match pretrained)
  encoder_patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  pretrain_decoder_dim: 512
  pretrain_decoder_depth: 4
  pretrain_decoder_num_heads: 8

  # Diffusion decoder: same patch size as pretrained for weight transfer
  decoder_patch_size: 16    # same as pretrained (196 patches)
  decoder_dim: 512
  decoder_depth: 4          # same as pretrained decoder
  decoder_num_heads: 8

# Diffusion
diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear

# Training
training:
  epochs: 200
  batch_size: 128
  lr: 1.0e-4
  min_lr: 1.0e-6
  weight_decay: 0.01
  warmup_epochs: 10
  clip_grad: 1.0
  freeze_encoder: false
  init_decoder_from_pretrained: true   # transfer pretrained decoder weights

# Logging
logging:
  log_dir: ./logs/finetune_diffusion_initdec
  save_every: 20
  print_every: 100
