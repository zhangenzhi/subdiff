# Baseline: Naive MAE (He et al. 2021) — pure pixel reconstruction from
# 25% visible patches. No diffusion noise, no curriculum.
# Purpose: fair apples-to-apples comparison against SubDiff variants.

data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  decoder_embed_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8
  naive_mae: true
  mask_ratio: 0.75           # standard MAE mask ratio

# diffusion / curriculum kept for config compatibility (unused by naive_mae)
diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear

curriculum:
  t_min_start: 0
  t_min_end: 0
  t_max_start: 0
  t_max_end: 0
  clean_ratio_start: 0.25
  clean_ratio_end: 0.25
  warmup_epochs: 0
  schedule: linear

training:
  epochs: 300
  batch_size: 256
  lr: 1.5e-4
  min_lr: 1.0e-6
  weight_decay: 0.05
  warmup_epochs: 40
  optimizer: adamw
  clip_grad: 3.0

probe:
  eval_every: 20
  probe_lr: 0.1
  probe_epochs: 30
  num_classes: 1000

logging:
  log_dir: ./logs_mae_naive
  save_every: 5
  print_every: 100
