# Baseline: Naive DDPM-ViT — standard DDPM training on a ViT backbone.
# Purpose: pure generative-pretraining baseline (no patch mixing, no MAE,
# no clean anchors, no curriculum). The closest apples-to-apples comparison
# point for any SubDiff "we beat DDPM training" claim.
#
# Setup:
#   - Per-image t ~ Uniform[0, 1000) (standard DDPM).
#   - Add noise to the entire image at level t.
#   - ViT encoder receives the noisy image; timestep is injected via the
#     cls_token (sinusoidal embedding + 2-layer MLP, then added to cls).
#   - Decoder predicts the noise epsilon for every patch.
#   - Loss: MSE on all patches (standard DDPM loss).

data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  decoder_embed_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8
  naive_ddpm: true
  qk_norm: true             # LayerNorm on Q/K per head; ViT-22B / SD3 / FLUX style

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear

# Curriculum unused by naive_ddpm; kept for config compatibility.
curriculum:
  t_min_start: 0
  t_min_end: 0
  t_max_start: 0
  t_max_end: 0
  clean_ratio_start: 0.0
  clean_ratio_end: 0.0
  warmup_epochs: 0
  schedule: linear

training:
  epochs: 300
  batch_size: 256
  lr: 1.0e-4              # DiT/DDPM standard: constant 1e-4, no decay
  min_lr: 1.0e-6          # unused when lr_schedule='constant'
  weight_decay: 0.0       # DiT paper uses 0 weight decay
  warmup_epochs: 0        # unused when lr_schedule='constant'
  lr_schedule: constant   # DDPM/DiT standard; skips warmup + cosine decay
  optimizer: adamw
  clip_grad: 1.0

probe:
  eval_every: 20
  probe_lr: 0.1
  probe_epochs: 30
  num_classes: 1000

logging:
  log_dir: ./logs_naive_ddpm
  save_every: 5
  print_every: 100
