# Naive Rectified Flow on ViT (SD3 / FLUX style).
# Testing whether RF + v-prediction + logit-normal t can improve over
# DDPM ε-prediction at 224×16 (where DDPM produces tile/bag-of-patches).
#
# Key ingredients from SD3:
#   - Linear interpolation path: x_t = (1-t) * x_0 + t * eps
#   - Predict v = eps - x_0 (velocity)
#   - Logit-normal t sampling (concentrates around middle t)
#   - Simple MSE loss on v

data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8
  transform_type: diffusion

model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  decoder_embed_dim: 512    # unused with dit_minimal_head
  decoder_depth: 4
  decoder_num_heads: 8
  naive_ddpm: true          # routes to naive-ViT forward (RF branch when flow_matching=true)
  qk_norm: true
  dit_minimal_head: true
  pos_embed_type: sincos

diffusion:
  num_timesteps: 1000       # used only for time_embed scalar scaling
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear
  flow_matching: true       # <-- activate Rectified Flow path
  rf_t_sampling: logit_normal
  rf_logit_mean: 0.0        # SD3 default (μ = 0)
  rf_logit_std: 1.0
  loss_weighting: simple

curriculum:
  t_min_start: 0
  t_min_end: 0
  t_max_start: 0
  t_max_end: 0
  clean_ratio_start: 0.0
  clean_ratio_end: 0.0
  warmup_epochs: 0
  schedule: linear

training:
  epochs: 300
  batch_size: 256
  lr: 1.0e-4
  min_lr: 1.0e-6
  weight_decay: 0.0
  warmup_epochs: 0
  lr_schedule: constant
  optimizer: adamw
  clip_grad: 1.0

probe:
  eval_every: 20
  probe_lr: 0.1
  probe_epochs: 30
  num_classes: 1000

logging:
  log_dir: ./logs_naive_rf
  save_every: 5
  print_every: 100
