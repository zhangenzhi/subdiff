# SubDiff Dual-Decoder Pretraining
# - Encoder sees 25% clean + 75% noisy patches (clean = spatial anchors)
# - Per-image t ~ Uniform[0, 1000) (standard DDPM, no curriculum)
# - Decoder A (self.decoder):     noise prediction (ε) — aligns with DDPM downstream
# - Decoder B (self.decoder_pix): clean-pixel reconstruction — MAE-style content learning
# - Loss on 75% noisy patches only (clean patches are trivial for both heads)
# - L = L_eps + pixel_loss_weight * L_pix

data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  decoder_embed_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8
  dual_decoder: true
  clean_ratio: 0.25         # 25% clean anchors, 75% noisy
  pixel_loss_weight: 1.0    # weight of pixel recon loss (eps loss weight is 1)

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear

# Curriculum is unused (t is uniform full-range), kept for compatibility.
curriculum:
  t_min_start: 0
  t_min_end: 0
  t_max_start: 1000
  t_max_end: 1000
  clean_ratio_start: 0.25
  clean_ratio_end: 0.25
  warmup_epochs: 0
  schedule: linear

training:
  epochs: 300
  batch_size: 256
  lr: 1.5e-4
  min_lr: 1.0e-6
  weight_decay: 0.05
  warmup_epochs: 40
  optimizer: adamw
  clip_grad: 3.0

probe:
  eval_every: 20
  probe_lr: 0.1
  probe_epochs: 30
  num_classes: 1000

logging:
  log_dir: ./logs_dual
  save_every: 5
  print_every: 100
