# SubDiff MAE-style Pretraining - Masked Noise Prediction (MaskDiT-inspired)
# - Encoder only sees 75% visible noisy patches (MAE-style)
# - Full-range t ~ Uniform[0, 1000) (standard DDPM, no curriculum)
# - Decoder fills mask tokens, predicts noise for all patches
# - Loss: eps-MSE on visible (primary) + on masked (aux 0.1)

data:
  imagenet_dir: /lustre1/work/c30636/dataset/imagenet
  image_size: 224
  num_workers: 8

model:
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  decoder_embed_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8
  mae_masking: true
  mask_ratio: 0.25          # mask 25%, encoder sees 75%

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule_type: linear
  predict_noise: true

# Curriculum is unused when mae_masking=true (t is sampled full-range),
# but kept for config compatibility.
curriculum:
  t_min_start: 0
  t_min_end: 0
  t_max_start: 1000
  t_max_end: 1000
  clean_ratio_start: 0.25
  clean_ratio_end: 0.25
  warmup_epochs: 0
  schedule: linear

training:
  epochs: 300
  batch_size: 256
  lr: 1.5e-4
  min_lr: 1.0e-6
  weight_decay: 0.05
  warmup_epochs: 40
  optimizer: adamw
  clip_grad: 3.0

probe:
  eval_every: 20
  probe_lr: 0.1
  probe_epochs: 30
  num_classes: 1000

logging:
  log_dir: ./logs_mae
  save_every: 5
  print_every: 100
